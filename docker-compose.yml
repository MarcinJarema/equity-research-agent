# Orkiestracja lokalna. ETAP 1: tylko serwis aplikacji.
# Serwis bazy (PostgreSQL + pgvector) dołączymy w ETAPIE 3 wraz z RAG.
services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    # Montujemy kod i włączamy --reload => zmiany w app/ widać bez przebudowy obrazu.
    volumes:
      - ./app:/code/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
