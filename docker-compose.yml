# Orkiestracja lokalna: aplikacja + PostgreSQL z pgvector (ETAP 3).
services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: equity
    ports:
      # 5433 na hoście (5432 bywa zajęty przez lokalnego Postgresa) -> 5432 w kontenerze.
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d equity"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Wewnątrz sieci compose baza jest pod hostem 'db', nie localhost.
      DATABASE_URL: postgresql://postgres:postgres@db:5432/equity
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./app:/code/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata:
